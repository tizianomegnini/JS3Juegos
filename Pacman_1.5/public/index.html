<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pacman Clone</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Background layers -->
<div id="stars"></div>
<div id="vignette"></div>
<div id="scanlines"></div>

<!-- ─── MENU ─── -->
<div id="menuScreen" class="screen active">
  <div class="menu-logo">
    <div class="logo-title">SPACE</div>
    <div class="logo-title">HUNTER</div>
    <div class="logo-sub">▸ ALIEN INVASION ◂</div>
  </div>
  <div class="menu-pac-demo">🚀</div>
  <div class="menu-ghost-row">🦑🕷️🐙🪲</div>
  <div class="high-score-display" id="hsDisplay"></div>
  <button class="btn" id="playBtn">▶ JUGAR</button>
  <div style="font-size:7px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-align:center;line-height:1.8">
    WASD / FLECHAS · P = PAUSA<br>RECOGE CRISTALES · NOVAS TE DAN PODER
  </div>
</div>

<!-- ─── GAME OVER ─── -->
<div id="gameOverScreen" class="screen">
  <div class="screen-title">GAME<br>OVER</div>
  <div class="score-display">PUNTAJE: <span id="finalScore">0</span></div>
  <div id="newHsLabel">🏆 ¡NUEVO RÉCORD!</div>
  <button class="btn" id="goBtn">↩ REINTENTAR</button>
  <button class="btn btn-secondary" id="goMenuBtn">MENÚ</button>
</div>

<!-- ─── WIN ─── -->
<div id="winScreen" class="screen">
  <div class="screen-title" style="color:#FFD700">¡GANASTE!</div>
  <div style="font-size:30px">🏆</div>
  <div class="score-display">PUNTAJE FINAL: <span id="winScore">0</span></div>
  <button class="btn" id="winBtn">▶ JUGAR DE NUEVO</button>
  <button class="btn btn-secondary" id="winMenuBtn">MENÚ</button>
</div>

<!-- ─── HUD ─── -->
<div id="hud">
  <div class="hud-item">
    <div class="hud-label">SCORE</div>
    <div class="hud-value" id="scoreUI">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">VIDAS</div>
    <div class="hud-value" id="livesUI">❤❤❤</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">NIVEL</div>
    <div class="level-badge" id="levelUI">1</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">RÉCORD</div>
    <div class="hud-value" id="hsUI">0</div>
  </div>
</div>

<!-- ─── CANVAS ─── -->
<div id="canvasWrap">
  <canvas id="game"></canvas>
</div>

<!-- ─── PAUSE ─── -->
<div id="pauseOverlay">
  <div class="pause-text">⏸ PAUSA</div>
  <div class="pause-hint">CLICK / P PARA CONTINUAR</div>
</div>

<!-- ─── LEVEL TRANSITION ─── -->
<div id="levelTransition">
  <div class="level-transition-text">NIVEL</div>
  <div class="level-transition-num" id="ltNum">1</div>
  <div class="level-transition-text" id="ltMsg">¡PREPARATE!</div>
</div>

<!-- ─── COMBO ─── -->
<div id="comboMsg">+200 × 1!</div>

<!-- ─── FRIGHT BAR ─── -->
<div id="frightBar"></div>

<!-- ─── SWIPE HINT ─── -->
<div id="swipeHint">DESLIZA PARA MOVER</div>

<!-- ─── D-PAD ─── -->
<div id="dpad">
  <button class="dpbtn" data-dir="up">▲</button>
  <button class="dpbtn" data-dir="left">◀</button>
  <button class="dpbtn" data-dir="right">▶</button>
  <button class="dpbtn" data-dir="down">▼</button>
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
