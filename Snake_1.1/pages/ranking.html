<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐍 Snake — Ranking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link id="global-css" rel="stylesheet" href="/styles/global-light.css" />
  <link id="page-css"   rel="stylesheet" href="/styles/ranking-light.css" />
  <script src="/scripts/pages/theme-loader.js"></script>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-custom sticky-top" role="navigation">
    <div class="container-fluid px-4">
      <a class="navbar-brand navbar-brand-text" href="/">🐍 SNAKE</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false" aria-label="Abrir menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">🏠 Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="/game">🎮 Jugar</a></li>
          <li class="nav-item"><a class="nav-link active" href="/ranking">🏆 Ranking</a></li>
        </ul>
        <button id="theme-toggle" aria-label="Cambiar tema">🌙</button>
      </div>
    </div>
  </nav>

  <main class="ranking-wrapper">
    <div class="container-fluid px-4">

      <div class="ranking-header">
        <h1 class="ranking-title">🏆 RANKING</h1>
        <p class="ranking-subtitle">Los mejores puntajes guardados en este dispositivo.</p>
      </div>

      <div class="ranking-filter-panel">
        <div class="ranking-filter-head">
          <div>
            <div class="ranking-filter-label">Ranking</div>
            <div class="ranking-filter-summary" id="ranking-filter-summary">Top 10 general</div>
          </div>
          <button class="filter-reset" id="reset-filters" type="button">Limpiar</button>
        </div>

        <div class="ranking-filter-grid">
          <label class="filter-field">
            <span>Modo</span>
            <select class="filter-select" data-filter="mode" aria-label="Filtrar por modo">
              <option value="">Todos</option>
              <option value="1P">1 jugador</option>
              <option value="2P">2 jugadores</option>
            </select>
          </label>

          <label class="filter-field">
            <span>Frutas</span>
            <select class="filter-select" data-filter="foodCount" aria-label="Filtrar por cantidad de frutas">
              <option value="">Todas</option>
              <option value="1">1 fruta</option>
              <option value="3">3 frutas</option>
              <option value="5">5 frutas</option>
            </select>
          </label>

          <label class="filter-field">
            <span>Paredes</span>
            <select class="filter-select" data-filter="wallMode" aria-label="Filtrar por paredes">
              <option value="">Todas</option>
              <option value="wall">Pared mortal</option>
              <option value="wrap">Sin paredes</option>
            </select>
          </label>

          <label class="filter-field">
            <span>Mapa</span>
            <select class="filter-select" data-filter="mapSize" aria-label="Filtrar por mapa">
              <option value="">Todos</option>
              <option value="small">Chico</option>
              <option value="medium">Medio</option>
              <option value="large">Grande</option>
            </select>
          </label>
        </div>
      </div>

      <div class="ranking-table-wrapper">
        <table class="ranking-table" aria-label="Tabla de ranking">
          <thead>
            <tr>
              <th>#</th>
              <th>INICIALES</th>
              <th>PUNTAJE</th>
              <th>MODO</th>
              <th>CONFIG</th>
              <th>FECHA</th>
            </tr>
          </thead>
          <tbody id="ranking-body">
            <tr><td colspan="6" style="text-align:center; padding:2rem; color:var(--text-muted);">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="text-center mt-4">
        <button id="clear-btn" class="btn btn-snake btn-snake-danger btn-sm">
          🗑️ Borrar todo el ranking
        </button>
        <a href="/game" class="btn btn-snake btn-snake-primary btn-sm ms-2">
          🎮 Jugar de nuevo
        </a>
      </div>

    </div>
  </main>

  <!-- Modal confirmación -->
  <div class="modal fade modal-custom" id="confirm-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body text-center py-4">
          <p id="confirm-message" class="mb-4" style="color: var(--text-primary); font-weight: 600;"></p>
          <div class="d-flex gap-2 justify-content-center">
            <button id="confirm-no"  class="btn btn-snake btn-snake-outline">Cancelar</button>
            <button id="confirm-yes" class="btn btn-snake btn-snake-danger">Borrar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="scroll-top-btn" aria-label="Volver al inicio">↑</button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/scripts/pages/ranking.js"></script>
</body>
</html>
