<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐍 Snake — Ranking</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Estilos del proyecto -->
  <link id="global-css" rel="stylesheet" href="/styles/global-light.css" />
  <link id="page-css"   rel="stylesheet" href="/styles/ranking-light.css" />
</head>
<body>

  <!-- ═══ NAVBAR ══════════════════════════════════════════════════════════ -->
  <nav class="navbar navbar-expand-lg navbar-custom sticky-top" role="navigation" aria-label="Navegación principal">
    <div class="container-fluid px-4">
      <a class="navbar-brand navbar-brand-text" href="/">🐍 SNAKE</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false" aria-label="Abrir menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">🏠 Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="/game">🎮 Jugar</a></li>
          <li class="nav-item"><a class="nav-link active" href="/ranking">🏆 Ranking</a></li>
        </ul>
        <button id="theme-toggle" aria-label="Cambiar tema">🌙</button>
      </div>
    </div>
  </nav>

  <!-- ═══ CONTENIDO PRINCIPAL ══════════════════════════════════════════════ -->
  <main class="ranking-wrapper">
    <div class="container-fluid px-4">

      <div class="ranking-header">
        <h1 class="ranking-title">🏆 RANKING</h1>
        <p class="ranking-subtitle">Los mejores puntajes guardados en este dispositivo.</p>
      </div>

      <!-- Filtros de modo -->
      <div class="ranking-filters">
        <button class="filter-btn active" data-mode="">Todos</button>
        <button class="filter-btn" data-mode="1P">1 Jugador</button>
        <button class="filter-btn" data-mode="2P">2 Jugadores</button>
      </div>

      <!-- Tabla -->
      <div class="ranking-table-wrapper">
        <table class="ranking-table" aria-label="Tabla de ranking">
          <thead>
            <tr>
              <th>#</th>
              <th>INICIALES</th>
              <th>PUNTAJE</th>
              <th>MODO</th>
              <th>FECHA</th>
            </tr>
          </thead>
          <tbody id="ranking-body">
            <tr>
              <td colspan="5" style="text-align:center; padding:2rem; color: var(--text-muted);">
                Cargando...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Botón limpiar -->
      <div class="text-center mt-4">
        <button id="clear-btn" class="btn btn-snake btn-snake-danger btn-sm">
          🗑️ Borrar todo el ranking
        </button>
        <a href="/game" class="btn btn-snake btn-snake-primary btn-sm ms-2">
          🎮 Jugar de nuevo
        </a>
      </div>

    </div>
  </main>

  <!-- ═══ MODAL CONFIRMACIÓN ════════════════════════════════════════════════ -->
  <div class="modal fade modal-custom" id="confirm-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body text-center py-4">
          <p id="confirm-message" class="mb-4" style="color: var(--text-primary); font-weight: 600;"></p>
          <div class="d-flex gap-2 justify-content-center">
            <button id="confirm-no"  class="btn btn-snake btn-snake-outline">Cancelar</button>
            <button id="confirm-yes" class="btn btn-snake btn-snake-danger">Borrar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SCROLL TOP ════════════════════════════════════════════════════════ -->
  <button id="scroll-top-btn" aria-label="Volver al inicio">↑</button>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { initTheme }     from "/scripts/common/theme.js";
    import { initNavbar }    from "/scripts/common/navbar.js";
    import { initScrollTop } from "/scripts/common/scrollTop.js";
    import { showToast, confirmAction, formatDate } from "/scripts/common/ui.js";
    import { getTopScores, clearScores } from "/scripts/common/storage.js";

    initTheme();
    initNavbar();
    initScrollTop();

    const MEDALS = ["🥇", "🥈", "🥉"];
    let currentMode = "";

    // ─── Renderizar tabla ──────────────────────────────────────────────────
    function renderRanking() {
      const scores = getTopScores(50, currentMode || null);
      const tbody  = document.getElementById("ranking-body");

      if (!scores.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" style="text-align:center; padding:2.5rem; color: var(--text-muted);">
              <div style="font-size:2rem; margin-bottom:0.5rem;">🏆</div>
              No hay puntajes todavía. ¡Jugá una partida!
            </td>
          </tr>`;
        return;
      }

      tbody.innerHTML = scores.map((entry, i) => {
        const rank  = i < 3 ? `<span class="rank-medal">${MEDALS[i]}</span>`
                             : `<span class="rank-number">${i + 1}</span>`;
        const date  = entry.date ? formatDate(entry.date) : "—";
        const mode  = entry.mode === "2P" ? "👥 2P" : "👤 1P";
        return `
          <tr>
            <td>${rank}</td>
            <td style="font-family: var(--font-pixel); letter-spacing:0.3em;">${entry.initials}</td>
            <td><span class="score-highlight">${entry.score}</span></td>
            <td>${mode}</td>
            <td style="color: var(--text-muted);">${date}</td>
          </tr>`;
      }).join("");
    }

    // ─── Filtros ───────────────────────────────────────────────────────────
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentMode = btn.dataset.mode;
        renderRanking();
      });
    });

    // ─── Limpiar ranking ───────────────────────────────────────────────────
    document.getElementById("clear-btn").addEventListener("click", async () => {
      const ok = await confirmAction("¿Borrar todo el ranking de este dispositivo?");
      if (!ok) return;
      clearScores();
      showToast("Ranking borrado.", "info");
      renderRanking();
    });

    // ─── Render inicial ────────────────────────────────────────────────────
    renderRanking();
  </script>

</body>
</html>
