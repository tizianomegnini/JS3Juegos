<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pacman Clone</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    /* CSS Personalizado */
    body {
      font-family: 'Press Start 2P', cursive;
      /* Evita el scroll pull-to-refresh en celulares */
      overscroll-behavior-y: contain; 
    }
    
    .text-pacman { color: #FFD700 !important; }
    
    .btn-pacman {
      background: transparent;
      border: 1px solid #FFD700;
      color: #FFD700;
      letter-spacing: 2px;
      transition: background 0.15s;
    }
    .btn-pacman:hover {
      background: rgba(255, 215, 0, 0.13);
      color: #FFD700;
    }
    
    .text-shadow-pacman { text-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
    .screen-min-h { min-height: 340px; }
    
    /* Contenedor principal fluido */
    .game-container { 
      width: 100%; 
      max-width: 532px; /* Límite máximo para PC */
      margin: 0 auto;
    }

    /* MAGIA RESPONSIVE PARA EL CANVAS */
    #game {
      width: 100%;
      height: auto;
      display: block;
      /* Mantiene los píxeles nítidos al escalar */
      image-rendering: pixelated; 
    }

    /* Lógica de estado Activo */
    .screen.active, #hud.active, #dpad.active, #pauseOverlay.active { display: flex !important; }
    #canvasWrap.active { display: block !important; }

    /* D-PAD Grid (Escalado para pulgares) */
    .dpad-grid {
      display: grid;
      /* Usa fracciones para que se adapte mejor o mantén un tamaño cómodo para tocar */
      grid-template-columns: repeat(3, minmax(48px, 60px));
      grid-template-rows: repeat(3, minmax(48px, 60px));
      gap: 6px;
      justify-content: center;
    }
    .dpbtn { 
      touch-action: manipulation; /* Evita el delay del doble tap en móviles */
    }
    
    /* Mensaje de Combo flotante */
    #comboMsg {
      text-shadow: 0 0 8px #00f;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }

    /* Ajustes tipográficos para pantallas muy chicas (iPhone SE, etc) */
    @media (max-width: 400px) {
      .hud-label { font-size: 8px !important; }
      .hud-val { font-size: 12px !important; min-width: auto !important;}
    }
  </style>
</head>

<body class="bg-black text-white min-vh-100 d-flex align-items-center justify-content-center m-0 p-2">

  <div id="root" class="bg-black rounded flex-column align-items-center w-100 d-flex p-0 p-md-3" style="max-width: 600px;">

    <div id="menuScreen" class="screen active d-none flex-column align-items-center justify-content-center gap-3 p-3 text-center screen-min-h w-100">
      <h1 class="text-pacman text-shadow-pacman mb-0" style="font-size: clamp(28px, 8vw, 42px); letter-spacing: 4px;">PAC-MAN</h1>
      <p class="text-secondary m-0" style="font-size: clamp(9px, 3vw, 13px); letter-spacing: 1px;">ARROW KEYS / WASD<br>P = PAUSA · R = REINICIAR</p>
      <p id="hsDisplay" class="text-pacman m-0" style="font-size: 13px; letter-spacing: 1px;"></p>
      <button class="btn btn-pacman px-4 py-2 mt-2" style="font-size: 15px;" id="playBtn">JUGAR</button>
    </div>

    <div id="gameOverScreen" class="screen d-none flex-column align-items-center justify-content-center gap-3 p-3 text-center screen-min-h w-100">
      <h1 class="text-danger mb-0" style="font-size: clamp(24px, 6vw, 28px);">GAME OVER</h1>
      <p class="text-secondary m-0" style="font-size: 12px; letter-spacing: 1px;">PUNTUACIÓN</p>
      <p class="text-pacman m-0 fw-medium" style="font-size: 28px;" id="finalScore">0</p>
      <p id="newHsLabel" class="text-pacman m-0" style="display:none; font-size: 12px; letter-spacing: 1px;">¡NUEVO RÉCORD!</p>
      <button class="btn btn-pacman px-4 py-2 mt-2" style="font-size: 15px;" id="goBtn">REINTENTAR</button>
    </div>

    <div id="winScreen" class="screen d-none flex-column align-items-center justify-content-center gap-3 p-3 text-center screen-min-h w-100">
      <h1 class="text-success mb-0" style="font-size: clamp(24px, 6vw, 28px);">¡GANASTE!</h1>
      <p class="text-secondary m-0" style="font-size: 12px; letter-spacing: 1px;">PUNTUACIÓN FINAL</p>
      <p class="text-pacman m-0 fw-medium" style="font-size: 28px;" id="winScore">0</p>
      <button class="btn btn-pacman px-4 py-2 mt-2" style="font-size: 15px;" id="winBtn">JUGAR DE NUEVO</button>
    </div>

    <div id="hud" class="d-none justify-content-between align-items-center px-2 py-2 bg-dark rounded-top game-container w-100">
      <div class="d-flex flex-column align-items-center gap-1">
        <span class="text-secondary hud-label" style="font-size: 10px; letter-spacing: 1px;">SCORE</span>
        <span class="text-pacman fw-medium text-center hud-val" style="font-size: 16px; min-width: 40px;" id="scoreUI">0</span>
      </div>
      <div class="d-flex flex-column align-items-center gap-1">
        <span class="text-secondary hud-label" style="font-size: 10px; letter-spacing: 1px;">RECORD</span>
        <span class="text-pacman fw-medium text-center hud-val" style="font-size: 16px; min-width: 40px;" id="hsUI">0</span>
      </div>
      <div class="d-flex flex-column align-items-center gap-1">
        <span class="text-secondary hud-label" style="font-size: 10px; letter-spacing: 1px;">NIVEL</span>
        <span class="text-pacman fw-medium text-center hud-val" style="font-size: 16px; min-width: 40px;" id="levelUI">1</span>
      </div>
      <div class="d-flex flex-column align-items-center gap-1">
        <span class="text-secondary hud-label" style="font-size: 10px; letter-spacing: 1px;">VIDAS</span>
        <span class="text-pacman fw-medium text-center hud-val" style="font-size: 14px; min-width: 40px;" id="livesUI">❤❤❤</span>
      </div>
    </div>

    <div id="canvasWrap" class="position-relative d-none game-container w-100">
      <canvas id="game"></canvas>
      <div id="comboMsg" class="position-absolute top-50 start-50 translate-middle text-white fs-4 fw-medium"></div>
      
      <div id="pauseOverlay" class="d-none position-absolute top-0 bottom-0 start-0 end-0 bg-dark bg-opacity-75 flex-column align-items-center justify-content-center gap-2 z-3">
        <p class="text-white m-0 fw-medium" style="font-size: clamp(16px, 5vw, 24px); letter-spacing: 3px;">PAUSA</p>
        <small class="text-secondary text-center px-2" style="font-size: clamp(9px, 3vw, 12px);">Presioná P para continuar</small>
      </div>
    </div>

    <div id="dpad" class="d-none flex-column align-items-center py-3 bg-dark rounded-bottom game-container w-100">
      <div class="dpad-grid">
        <div class="invisible"></div>
        <button class="btn btn-dark border-secondary text-secondary fs-5 d-flex align-items-center justify-content-center user-select-none dpbtn" data-dir="up">▲</button>
        <div class="invisible"></div>
        
        <button class="btn btn-dark border-secondary text-secondary fs-5 d-flex align-items-center justify-content-center user-select-none dpbtn" data-dir="left">◀</button>
        <div class="invisible"></div>
        <button class="btn btn-dark border-secondary text-secondary fs-5 d-flex align-items-center justify-content-center user-select-none dpbtn" data-dir="right">▶</button>
        
        <div class="invisible"></div>
        <button class="btn btn-dark border-secondary text-secondary fs-5 d-flex align-items-center justify-content-center user-select-none dpbtn" data-dir="down">▼</button>
        <div class="invisible"></div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
